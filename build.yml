name: Build LHM
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1
      - name: Build Solution
        run: msbuild LibreHardwareMonitor.sln /p:Configuration=Release
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: LHM-Test-Build
          path: bin/Release/
